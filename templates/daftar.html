<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pendaftaran Damar Adventure</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.container{
    width:90%;
    max-width:500px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#2ecc71;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#27ae60;
}

</style>

</head>

<body>

<div class="container">

<h1>📝 Form Pendaftaran</h1>

<form action="/submit" method="POST">

<label>Nama Lengkap</label>
<input type="text" name="nama" placeholder="Masukkan nama lengkap" required>

<label>Nomor WhatsApp</label>
<input type="text" name="wa" placeholder="08xxxxxxxxxx" required>

<label>Alamat</label>
<textarea name="alamat" placeholder="Alamat lengkap" required></textarea>

<label>Pilih Gunung</label>

<select name="gunung" required>
<option value="">-- Pilih Gunung --</option>
<option>Ciremai</option>
<option>Papandayan</option>
<option>Gede Pangrango</option>
<option>Slamet</option>
<option>Merbabu</option>
<option>Merapi</option>
<option>Sindoro</option>
<option>Sumbing</option>
</select>

<label>Tanggal Keberangkatan</label>
<input type="date" name="tanggal" required>

<button type="submit">
LANJUT KE PEMBAYARAN DP
</button>

</form>

</div>

</body>
</html>
